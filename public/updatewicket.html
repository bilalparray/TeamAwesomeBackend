<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Wicket</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/">Team Admin</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar"
                aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mainNavbar">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">

                    <li class="nav-item">
                        <a class="nav-link" href="/scorecard">Scorecard Processor</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/battingorder">Batting Order</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/update">Update Runs</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/updateplayer">Update Player Profile</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/updatewicket">Update Wickets</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/updatelast">Update Last Slot</a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>
    <div class="container py-5">
        <h1 class="mb-4">Add Wicket</h1>
        <form id="wicketForm" class="row g-3">
            <div class="col-12">
                <label for="playerSelect" class="form-label">Select Player</label>
                <select id="playerSelect" name="playerId" class="form-select" required>
                    <option value="" disabled selected>-- choose player --</option>
                </select>
            </div>

            <div class="col-12">
                <label for="wicketInput" class="form-label">Wicket Entry</label>
                <input type="number" id="wicketInput" name="wicket" class="form-control" placeholder="676" required />
            </div>

            <div class="col-12">
                <button type="submit" class="btn btn-primary">Add Wicket</button>
            </div>
        </form>

        <!-- Loader -->
        <div id="loader" class="loader-overlay d-none">
            <div class="spinner-border" role="status">
                <span class="visually-hidden">Loading…</span>
            </div>
        </div>
    </div>
    <div class="row  m-3 buttons">
        <a type="button" class="btn btn-primary" href="/scorecard">Scorecard Processor</a>
        <a type="button" class="btn btn-primary" href="/battingorder">Go to Batting order Page</a>
        <a type="button" class="btn btn-primary" href="/update">Update Runs</a>
        <a type="button" class="btn btn-primary" href="/updateplayer">Update Player Profile</a>
        <a type="button" class="btn btn-primary" href="/updatewicket">Update wickets</a>
        <a type="button" class="btn btn-primary" href="/updatelast">Update last slot</a>



    </div>
    <!-- Bootstrap JS bundle -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Your constants -->
    <script type="module" src="appconstants.js"></script>
    <!-- Page logic -->
    <script type="module" src="updatewicket.js"></script>
</body>

</html>
