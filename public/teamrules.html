<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Rules</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet" />
  <style>
    body {
      background: #f8f9fa;
    }

    .rule-item {
      background: #fff;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 10px;
    }

    .rule-number {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #198754;
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      flex-shrink: 0;
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="/">Team Admin</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar"
        aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNavbar">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">

          <li class="nav-item">
            <a class="nav-link" href="/scorecard">Scorecard Processor</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="/battingorder">Batting Order</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="/mateturn">Mate Turn</a>
          </li>

          <li class="nav-item">
            <a class="nav-link active" href="/teamrules">Team Rules</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="/update">Update Runs</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="/updateplayer">Update Player Profile</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="/updatewicket">Update Wickets</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="/updatelast">Update Last Slot</a>
          </li>

        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    <div class="row justify-content-center">
      <div class="col-12 col-lg-8">
        <h1 class="text-center mb-2">Team Rules</h1>
        <p class="text-center text-muted mb-4">
          Rules shown to all players in the app under Settings → Team Rules.
        </p>

        <div class="card shadow-sm mb-4">
          <div class="card-header bg-success text-white fw-semibold">Add rule</div>
          <div class="card-body">
            <div class="mb-3">
              <label for="newRuleInput" class="form-label">Rule text</label>
              <textarea id="newRuleInput" class="form-control" rows="3"
                placeholder="e.g. Be at the ground 30 minutes before match time"></textarea>
            </div>
            <button type="button" id="btnAddRule" class="btn btn-outline-success">Add to list</button>
          </div>
        </div>

        <div class="card shadow-sm mb-4">
          <div class="card-header bg-secondary text-white d-flex justify-content-between align-items-center">
            <span class="fw-semibold">Current rules</span>
            <small id="updatedAtLabel" class="text-white-50"></small>
          </div>
          <div class="card-body">
            <div id="rulesList">
              <div class="text-muted">Loading…</div>
            </div>
          </div>
        </div>

        <div class="d-grid gap-2">
          <button type="button" id="btnPublish" class="btn btn-success btn-lg">Publish rules</button>
        </div>
      </div>
    </div>
  </div>

  <div id="loader" class="loader-overlay d-none">
    <div class="spinner-border" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script type="module" src="teamrules.js"></script>
</body>

</html>
